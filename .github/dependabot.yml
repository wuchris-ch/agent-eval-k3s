version: 2

updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: uv
    directory: /src/agent_eval/scanner_runtime
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 5
    groups:
      scanner-runtime:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
