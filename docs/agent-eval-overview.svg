<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 410" role="img" aria-labelledby="title description">
  <title id="title">How agent-eval works</title>
  <desc id="description">A code review turns a change into a risk report. An agent evaluation turns a task into a scorecard. Metrics come from agent events, the evaluator, and the harness.</desc>
  <defs>
    <style>
      :root {
        --background: #ffffff;
        --surface: #f8fafc;
        --text: #111827;
        --muted: #64748b;
        --border: #cbd5e1;
        --arrow: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0b0f14;
          --surface: #121820;
          --text: #e5e7eb;
          --muted: #9ca3af;
          --border: #334155;
          --arrow: #64748b;
        }
      }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--text); }
      .background { fill: var(--background); }
      .box { fill: var(--surface); stroke: var(--border); stroke-width: 1; }
      .line { fill: none; stroke: var(--arrow); stroke-width: 1.5; marker-end: url(#arrowhead); }
      .rule { stroke: var(--border); stroke-width: 1; }
      .title { font-size: 22px; font-weight: 650; }
      .lane { font-size: 12px; font-weight: 700; letter-spacing: .1em; fill: var(--muted); }
      .box-title { font-size: 15px; font-weight: 650; }
      .detail { font-size: 12px; fill: var(--muted); }
      .source-title { font-size: 13px; font-weight: 650; }
      .source-detail { font-size: 11px; fill: var(--muted); }
      .principle { font-size: 12px; font-weight: 600; fill: var(--muted); }
    </style>
    <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0 0 7 3.5 0 7Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="background" width="1200" height="410"/>
  <text class="title" x="40" y="42">How it works</text>

  <text class="lane" x="40" y="94">REVIEW</text>
  <rect class="box" x="150" y="66" width="210" height="58" rx="4"/>
  <text class="box-title" x="170" y="91">Code change</text>
  <text class="detail" x="170" y="111">base + head</text>
  <path class="line" d="M360 95 H419"/>
  <rect class="box" x="420" y="66" width="260" height="58" rx="4"/>
  <text class="box-title" x="440" y="91">Collect evidence</text>
  <text class="detail" x="440" y="111">policy, tests, scanners, review</text>
  <path class="line" d="M680 95 H739"/>
  <rect class="box" x="740" y="66" width="210" height="58" rx="4"/>
  <text class="box-title" x="760" y="91">Risk report</text>
  <text class="detail" x="760" y="111">low, medium, or high</text>

  <text class="lane" x="40" y="184">AGENT RUN</text>
  <rect class="box" x="150" y="156" width="170" height="58" rx="4"/>
  <text class="box-title" x="170" y="181">Task</text>
  <text class="detail" x="170" y="201">prompt + starter code</text>
  <path class="line" d="M320 185 H369"/>
  <rect class="box" x="370" y="156" width="210" height="58" rx="4"/>
  <text class="box-title" x="390" y="181">Agent edits code</text>
  <text class="detail" x="390" y="201">Claude Code or Codex</text>
  <path class="line" d="M580 185 H629"/>
  <rect class="box" x="630" y="156" width="210" height="58" rx="4"/>
  <text class="box-title" x="650" y="181">Independent grade</text>
  <text class="detail" x="650" y="201">hidden tests + checks</text>
  <path class="line" d="M840 185 H889"/>
  <rect class="box" x="890" y="156" width="210" height="58" rx="4"/>
  <text class="box-title" x="910" y="181">Scorecard</text>
  <text class="detail" x="910" y="201">outcome + metrics</text>

  <line class="rule" x1="40" y1="252" x2="1160" y2="252"/>
  <text class="lane" x="40" y="286">METRICS COME FROM</text>

  <text class="source-title" x="260" y="286">Agent events</text>
  <text class="source-detail" x="260" y="307">tokens, turns, tools, model, cost when available</text>

  <text class="source-title" x="620" y="286">Evaluator</text>
  <text class="source-detail" x="620" y="307">tests and coverage</text>

  <text class="source-title" x="850" y="286">Harness</text>
  <text class="source-detail" x="850" y="307">time, exit, diff, scanners, judge</text>

  <rect class="box" x="40" y="345" width="1120" height="40" rx="4"/>
  <text class="principle" x="600" y="370" text-anchor="middle">Missing values stay missing. Required missing evidence fails the check.</text>
</svg>
